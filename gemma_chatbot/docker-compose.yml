services:
  gemma4-server:
    container_name: "${MODEL_NAME}-server"
    image: vllm/vllm-openai:gemma4-cu130
    restart: unless-stopped
    ports:
      - "${VLLM_PORT}:8000"
    volumes:
      - ${HOME}/models/${MODEL_PATH}:/workspace:ro
    command:
      - "/workspace"
      - --served-model-name
      - ${MODEL_NAME}
      - --tensor-parallel-size
      - ${TENSOR_PARALLEL_SIZE}
      - --quantization
      - fp8
      - --dtype
      - auto
      - --max-model-len
      - ${MAX_MODEL_LEN}
      - --gpu-memory-utilization
      - ${GPU_MEMORY_UTILIZATION}
      - --enable-chunked-prefill
      - --enable-prefix-caching
      - --max-num-batched-tokens
      - "2048"
      - --max-num-seqs
      - ${MAX_NUM_SEQS}
      - --host 
      - "0.0.0.0"
      - --port
      - "8000"
      - --api-key
      - ${VLLM_API_KEY}
      - --trust-remote-code
      - --enforce-eager
      - --enable-auto-tool-choice
      - --enable-reasoning
      - --tool-call-parser 
      - gemma4
      - --reasoning-parser
      - gemma4
    ipc: host
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 300s
    networks:
      - ai-network

  open-webui:
    container_name: open-webui
    image: ghcr.io/open-webui/open-webui:main
    restart: unless-stopped
    ports:
      - ${WEBUI_PORT}:8080
    volumes:
      - open-webui-data:/app/backend/data
    environment:
      - ENABLE_OLLAMA_API=false
      - OPENAI_API_BASE_URL=http://${MODEL_NAME}-server:8000/v1
      - OPENAI_API_KEY=${VLLM_API_KEY}
      - DEFAULT_MODELS=${MODEL_NAME}
    depends_on:
      gemma4-server:
        condition: service_healthy
    networks:
      - ai-network

  searxng:
    container_name: searxng
    image: docker.io/searxng/searxng:latest
    restart: unless-stopped
    ports:
      - ${SEAR_PORT}:8888
    volumes:
      - ${HOME}/searxng/config:/etc/searxng
      - ${HOME}/searxng/data:/var/cache/searxng
    environment:
      - SEARXNG_BIND_ADDRESS=0.0.0.0
      - SEARXNG_PORT=8888
    networks:
      - ai-network

volumes:
  open-webui-data:
    name: open-webui-data

networks:
  ai-network:
    name: ai-network
    driver: bridge
