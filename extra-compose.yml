vllm serve
    --model /path/to/your/model \
    --tensor-parallel-size 1 \
    --max-model-len 4096 \
    --max-num-batched-tokens 512 \
    --max-num-seqs 8 \
    --enable-chunked-prefill \
    --enable-prefix-caching \
    --gpu-memory-utilization 0.92 \
    --scheduling-policy fcfs \
    --num-scheduler-steps 1 \
    --dtype auto \
    --trust-remote-code
